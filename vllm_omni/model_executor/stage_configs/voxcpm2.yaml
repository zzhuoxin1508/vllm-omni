# VoxCPM2 AR pipeline with per-request state batching.
# Uses native MiniCPM4 base_lm + per-request StaticKVCache.
# max_batch_size > 1 supported via KV cache save/restore.
stage_args:
  - stage_id: 0
    stage_type: llm
    is_comprehension: true
    runtime:
      devices: "0"
      max_batch_size: 4
    engine_args:
      dtype: bfloat16
      model_stage: latent_generator
      model_arch: VoxCPM2TalkerForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      enforce_eager: true
      trust_remote_code: true
      async_scheduling: true
      enable_prefix_caching: false
      engine_output_type: audio
      gpu_memory_utilization: 0.9
      distributed_executor_backend: "mp"
      max_num_batched_tokens: 4096
      max_model_len: 4096
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 4096
      seed: 42
      detokenize: false
      repetition_penalty: 1.0
      stop_token_ids: [1]
    final_output: true
    final_output_type: audio
